<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Справа: Таємниця Паули</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Special+Elite&family=Press+Start+2P&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/phaser@3.70.0/dist/phaser.min.js"></script>
<style>
  :root{
    --ink:#0e0b08; --amber:#d99a3f; --amber-glow:#f0b558;
    --parchment:#e9dcbd; --ash:#8a8378;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;background:#000;height:100%;overflow:hidden;font-family:'Special Elite',monospace;}
  #game-wrap{position:relative;width:100vw;height:100vh;}
  #phaser-container{width:100%;height:100%;}
  canvas{image-rendering:pixelated;display:block;}

  #hud{
    position:absolute;top:10px;left:10px;z-index:60;
    background:rgba(14,11,8,.85);border:1px solid var(--amber);border-radius:4px;padding:8px 12px;
    font-family:'Press Start 2P',monospace;font-size:9px;color:var(--parchment);
  }
  #hud .room-name{color:var(--amber-glow);font-family:'Cinzel',serif;font-size:14px;margin-bottom:4px;}

  #interact-prompt{
    position:absolute;z-index:55;transform:translate(-50%,-100%);
    background:var(--amber);color:#241a0a;font-family:'Press Start 2P',monospace;font-size:9px;
    padding:5px 8px;border-radius:3px;display:none;white-space:nowrap;pointer-events:none;
  }
  #interact-prompt::after{
    content:"";position:absolute;left:50%;bottom:-6px;transform:translateX(-50%);
    border:6px solid transparent;border-top-color:var(--amber);
  }

  /* Текстові діалоги (конверти) */
  #dialog{
    position:absolute;left:50%;bottom:24px;transform:translateX(-50%);z-index:80;
    width:min(680px,92vw);background:linear-gradient(180deg,#241d15,#161009);
    border:2px solid var(--amber);border-radius:6px;padding:16px 18px;display:none;
    box-shadow:0 12px 30px rgba(0,0,0,.6);
  }
  #dialog .txt b{color:var(--amber-glow);font-family:'Cinzel',serif;font-size:16px;display:block;margin-bottom:8px;}
  #dialog .txt p{margin:0;font-size:14px;color:var(--parchment);line-height:1.6;}
  #dialog .close-hint{margin-top:10px;text-align:right;font-size:10px;color:var(--ash);}

  /* Медіа-модалка (для твоїх фото, відео, аудіо) */
  #media-modal{
    position:absolute;inset:0;z-index:100;display:none;
    background:rgba(0,0,0,0.9);align-items:center;justify-content:center;flex-direction:column;
  }
  #media-container{
    max-width:90vw;max-height:80vh;display:flex;align-items:center;justify-content:center;
  }
  #media-container img, #media-container video{
    max-width:100%;max-height:80vh;border:3px solid var(--amber);border-radius:8px;box-shadow:0 0 30px rgba(217,154,63,0.3);
  }
  .audio-panel{
    background:#241d15;padding:30px;border-radius:12px;border:2px solid var(--amber);text-align:center;
  }
  .audio-panel h3{color:var(--amber-glow);font-family:'Cinzel',serif;margin:0 0 15px 0;}
  .close-media-btn{
    margin-top:20px;padding:10px 20px;font-family:'Cinzel',serif;font-weight:bold;
    background:var(--amber);color:#000;border:none;border-radius:4px;cursor:pointer;
  }
</style>
</head>
<body>
<div id="game-wrap">
  <div id="phaser-container"></div>

  <div id="hud">
    <div class="room-name" id="room-name">Початкова кімната</div>
    <div>Управління: WASD / Стрілки</div>
    <div>Взаємодія: E</div>
  </div>

  <div id="interact-prompt">E</div>

  <div id="dialog">
    <div class="txt">
      <b id="dialog-name"></b>
      <p id="dialog-text"></p>
    </div>
    <div class="close-hint">Натисни E / Enter, щоб закрити</div>
  </div>

  <div id="media-modal">
    <div id="media-container"></div>
    <button class="close-media-btn" onclick="closeMedia()">Закрити</button>
  </div>
</div>

<script>
/* =====================================================================
   WORLD LAYOUT
        [Street (Winter)]
               |
   [Next Room]—[Start Room]
               |
           [Bedroom]
   ===================================================================== */
const ROOM_W = 720, ROOM_H = 480, WALL = 28, DOOR_W = 90;
const roomDefs = [
  { key:'start',   name:'Початкова кімната', worldX:780, worldY:520, floor:0x2c2417, wallTint:0x1a140e, accent:0x4a3828 },
  { key:'next',    name:'Наступна кімната',  worldX:0,   worldY:520, floor:0x1e180f, wallTint:0x140f09, accent:0x3a2e1e },
  { key:'street',  name:'Засніжена вулиця',  worldX:0,   worldY:0,   floor:0xe0e6ed, wallTint:0x5c6b7a, accent:0x8fa1b3 }, // Зима
  { key:'bedroom', name:'Спальня',           worldX:0,   worldY:1040,floor:0x2b1d1d, wallTint:0x1a1010, accent:0x4a2828 },
];
const WORLD_W = 1500, WORLD_H = 1520;

const doorDefs = [
  { id:'d1', from:'start', to:'next',    side:'left',  pos:0.5, label:'Двері далі' },
  { id:'d2', from:'next',  to:'street',  side:'top',   pos:0.5, label:'Вихід на вулицю' },
  { id:'d3', from:'next',  to:'bedroom', side:'bottom',pos:0.5, label:'Двері у спальню' },
];

function getRoom(key){ return roomDefs.find(r=>r.key===key); }
function roomOrigin(key){ const r=getRoom(key); return {x:r.worldX, y:r.worldY}; }

/* 
  Словник інтерактивних об'єктів. 
  Типи:
  - dialog: відкриває текстове вікно.
  - photo/video/audio: відкриває DOM-оверлей із відповідним медіа. 
    (Вкажи власні шляхи у полі src)
*/
const objectData = [
  // Початкова кімната
  { id:'env_start', room:'start', x:360, y:240, type:'dialog', label:'Конверт', icon:'hot_env',
    name:'Лист у початковій кімнаті', text:'"Вітаю, Пауло. Це лише початок твого шляху. Подивись на стіну..."' },
  { id:'photo_wall', room:'start', x:360, y:60, type:'photo', label:'Фото на стіні', icon:'hot_photo',
    src:'assets/my_photo.jpg' }, // Твоє фото

  // Наступна кімната
  { id:'env_next', room:'next', x:200, y:240, type:'dialog', label:'Конверт', icon:'hot_env',
    name:'Лист у наступній кімнаті', text:'"Ти робиш успіхи. Поглянь, що я залишив для тебе на камері."' },
  { id:'camera_vid', room:'next', x:500, y:200, type:'video', label:'Стара камера', icon:'hot_cam',
    src:'assets/my_video.mp4' }, // Твоє відео

  // Вулиця (Зима)
  { id:'env_street', room:'street', x:150, y:200, type:'dialog', label:'Конверт', icon:'hot_env',
    name:'Лист на снігу', text:'"Холодно, чи не так? Але ці ківі якось ростуть. Знайди дві фотографії, що впали поруч."' },
  { id:'drop_ph1', room:'street', x:300, y:300, type:'photo', label:'Випавша фотографія 1', icon:'hot_photo',
    src:'assets/street_photo1.jpg' }, 
  { id:'drop_ph2', room:'street', x:400, y:340, type:'photo', label:'Випавша фотографія 2', icon:'hot_photo',
    src:'assets/street_photo2.jpg' },

  // Спальня
  { id:'env_bed', room:'bedroom', x:120, y:120, type:'dialog', label:'Конверт', icon:'hot_env',
    name:'Лист у спальні', text:'"Остання кімната. Тут зберігаються найтепліші спогади та голоси."' },
  { id:'bed_ph1', room:'bedroom', x:100, y:400, type:'photo', label:'Фотографія 1', icon:'hot_photo',
    src:'assets/bed_photo1.jpg' },
  { id:'bed_ph2', room:'bedroom', x:160, y:400, type:'photo', label:'Фотографія 2', icon:'hot_photo',
    src:'assets/bed_photo2.jpg' },
  { id:'bed_ph3', room:'bedroom', x:220, y:400, type:'photo', label:'Фотографія 3', icon:'hot_photo',
    src:'assets/bed_photo3.jpg' },
  { id:'disc_mykhailo', room:'bedroom', x:550, y:220, type:'audio', label:'Диск 1', icon:'hot_disc',
    name:'Голосове привітання (Андрій)', src:'assets/voice_mykhailo.mp3' },
  { id:'disc_vika', room:'bedroom', x:630, y:220, type:'audio', label:'Диск 2', icon:'hot_disc',
    name:'Голосове привітання (Віка)', src:'assets/voice_vika.mp3' }
];

let player, cursors, wasd, wallsGroup, phaserScene;
let interactables = [], doorInteractables = [];
let nearestInteractable = null, nearestDoor = null;
let uiState = 'game'; // 'game', 'dialog', 'media'
let unlockedRooms = new Set(['start']);
let currentRoomKey = 'start';
let fogRects = {};

/* =====================================================================
   ГЕНЕРАЦІЯ ТЕКСТУР
   ===================================================================== */
function makeTextures(scene){
  const g = scene.add.graphics();
  const s = 40;
  // Гравець (Паула)
  g.fillStyle(0x000000, 0.35); g.fillEllipse(s/2, s-6, 16, 6);
  g.fillStyle(0xead8bd, 1); g.fillRect(s/2-7, s-18, 5, 10); g.fillRect(s/2+2, s-18, 5, 10);
  g.fillStyle(0x5c8f6b, 1); g.fillTriangle(s/2-11, s-14, s/2+11, s-14, s/2, s-24); // Зелене пальто
  g.fillStyle(0xead8bd, 1); g.fillCircle(s/2, s-32, 8);
  g.generateTexture('player_tex', s, s);
  g.destroy();

  // Іконки предметів
  const createIcon = (key, color) => {
    const h = scene.add.graphics();
    h.fillStyle(color, 0.9); h.fillCircle(16,16,8);
    h.lineStyle(2, color, 0.5); h.strokeCircle(16,16,14);
    h.generateTexture(key, 32, 32); h.destroy();
  };
  createIcon('hot_env', 0xd99a3f);   // Конверт (жовтий)
  createIcon('hot_photo', 0x5c8f6b); // Фото (зелений)
  createIcon('hot_cam', 0x8a8378);   // Камера (сірий)
  createIcon('hot_disc', 0xb95a8a);  // Диск (фіолетовий)

  // Двері
  const d = scene.add.graphics();
  d.fillStyle(0x3a2718, 1); d.fillRect(0,0,90,28);
  d.fillStyle(0xd99a3f, 1); d.fillCircle(72,14,5);
  d.generateTexture('door_closed', 90, 28);
  d.destroy();

  const o = scene.add.graphics();
  o.fillStyle(0x1a140e, 0.6); o.fillRect(0,0,90,8);
  o.generateTexture('door_open', 90, 8);
  o.destroy();
}

function drawRoomDecor(scene, room){
  const rx = room.worldX, ry = room.worldY;

  // Виноградник з ківі на сніжній вулиці
  if(room.key === 'street'){
    const gfx = scene.add.graphics();
    // Лози
    gfx.lineStyle(4, 0x4a3828, 0.8);
    for(let i=0; i<4; i++){
      gfx.beginPath();
      gfx.moveTo(rx + 150 + i*130, ry + 50);
      gfx.quadraticCurveTo(rx + 200 + i*130, ry + 250, rx + 100 + i*130, ry + 400);
      gfx.strokePath();
    }
    // Ківі (зелені плоди)
    gfx.fillStyle(0x6b8e23, 1);
    for(let i=0; i<30; i++){
      let kx = rx + 100 + Math.random() * 500;
      let ky = ry + 80 + Math.random() * 300;
      gfx.fillCircle(kx, ky, 6);
    }
  }

  // Вініловий програвач у спальні
  if(room.key === 'bedroom'){
    // Ліжко
    scene.add.rectangle(rx + 600, ry + 150, 120, 200, 0x5a3a3a).setStrokeStyle(2, 0x1a1010);
    scene.add.rectangle(rx + 600, ry + 80, 100, 40, 0xcccccc); // Подушка
    // Стіл із програвачем
    scene.add.rectangle(rx + 590, ry + 380, 160, 70, 0x3d2a1a);
    scene.add.circle(rx + 550, ry + 380, 25, 0x111111); // Платівка на програвачі
    scene.add.circle(rx + 550, ry + 380, 8, 0xb95a8a); // Центр платівки
    scene.add.line(0,0, rx+580, ry+360, rx+550, ry+380, 0xcccccc).setLineWidth(3); // Тонарм
  }
}

// === ІНІЦІАЛІЗАЦІЯ PHASER ===
function create(){
  phaserScene = this;
  makeTextures(this);
  this.physics.world.setBounds(0,0,WORLD_W,WORLD_H);
  this.cameras.main.setBackgroundColor('#050403');
  wallsGroup = this.physics.add.staticGroup();

  // Малюємо кімнати
  roomDefs.forEach(room=>{
    const rx=room.worldX, ry=room.worldY;
    this.add.rectangle(rx+ROOM_W/2, ry+ROOM_H/2, ROOM_W, ROOM_H, room.floor).setDepth(0);
    drawRoomDecor(this, room);
    
    // Зовнішні стіни (спрощена логіка для прикладу)
    let wTop = this.add.rectangle(rx+ROOM_W/2, ry+10, ROOM_W, 20, room.wallTint);
    let wBot = this.add.rectangle(rx+ROOM_W/2, ry+ROOM_H-10, ROOM_W, 20, room.wallTint);
    let wLeft = this.add.rectangle(rx+10, ry+ROOM_H/2, 20, ROOM_H, room.wallTint);
    let wRight = this.add.rectangle(rx+ROOM_W-10, ry+ROOM_H/2, 20, ROOM_H, room.wallTint);
    wallsGroup.addMultiple([wTop, wBot, wLeft, wRight]);
    this.physics.add.existing(wTop, true); this.physics.add.existing(wBot, true);
    this.physics.add.existing(wLeft, true); this.physics.add.existing(wRight, true);
    
    // Туман
    let fog = this.add.rectangle(rx+ROOM_W/2, ry+ROOM_H/2, ROOM_W, ROOM_H, 0x000, 0.95).setDepth(50);
    fogRects[room.key] = fog;
    if(unlockedRooms.has(room.key)) fog.setAlpha(0);
  });

  // Двері
  doorDefs.forEach(door=>{
    let pos = {x:0, y:0, horiz:false};
    let rFrom = getRoom(door.from);
    if(door.side==='left') { pos.x = rFrom.worldX; pos.y = rFrom.worldY + ROOM_H/2; pos.horiz=false; }
    if(door.side==='top') { pos.x = rFrom.worldX + ROOM_W/2; pos.y = rFrom.worldY; pos.horiz=true; }
    if(door.side==='bottom') { pos.x = rFrom.worldX + ROOM_W/2; pos.y = rFrom.worldY + ROOM_H; pos.horiz=true; }

    const spr = this.add.image(pos.x, pos.y, 'door_closed').setDepth(10);
    if(!pos.horiz) spr.setAngle(90);
    
    // Вирізаємо прохід у стіні (робимо двері перешкодою поки закриті)
    let blocker = this.add.rectangle(pos.x, pos.y, pos.horiz?90:20, pos.horiz?20:90, 0xff0000, 0);
    this.physics.add.existing(blocker, true);
    wallsGroup.add(blocker);

    let entry = { sprite:spr, blocker:blocker, data:door, wx:pos.x, wy:pos.y, open:false };
    doorInteractables.push(entry);
  });

  // Інтерактивні об'єкти
  objectData.forEach(obj=>{
    const o = roomOrigin(obj.room);
    const wx = o.x + obj.x, wy = o.y + obj.y;
    const spr = this.add.image(wx, wy, obj.icon).setDepth(15);
    this.tweens.add({ targets:spr, scale:{from:0.9,to:1.1}, duration:800, yoyo:true, repeat:-1 });
    interactables.push({ sprite:spr, data:obj, wx, wy, room:obj.room });
  });

  // Гравець
  const startRoom = getRoom('start');
  player = this.physics.add.sprite(startRoom.worldX + ROOM_W/2, startRoom.worldY + ROOM_H/2, 'player_tex');
  player.setDepth(20).setCollideWorldBounds(true);
  player.body.setSize(20,20).setOffset(10,20);
  this.physics.add.collider(player, wallsGroup);

  this.cameras.main.startFollow(player, true, 0.1, 0.1);
  cursors = this.input.keyboard.createCursorKeys();
  wasd = this.input.keyboard.addKeys({ up:'W', down:'S', left:'A', right:'D' });

  this.input.keyboard.on('keydown-E', ()=>{
    if(uiState !== 'game') {
      if(uiState === 'dialog') closeDialog();
      if(uiState === 'media') closeMedia();
      return;
    }
    if(nearestDoor && !nearestDoor.open) { openDoor(nearestDoor); return; }
    if(nearestInteractable) interactWith(nearestInteractable.data);
  });
  
  this.input.keyboard.on('keydown-ENTER', ()=>{
    if(uiState === 'dialog') closeDialog();
  });
}

function update(){
  if(uiState !== 'game'){ player.setVelocity(0); return; }
  
  const speed = 200;
  let vx=0, vy=0;
  if(cursors.left.isDown || wasd.left.isDown) vx=-1;
  else if(cursors.right.isDown || wasd.right.isDown) vx=1;
  if(cursors.up.isDown || wasd.up.isDown) vy=-1;
  else if(cursors.down.isDown || wasd.down.isDown) vy=1;
  
  const len = Math.hypot(vx,vy)||1;
  player.setVelocity((vx/len)*speed, (vy/len)*speed);

  // Визначення поточної кімнати
  for(const room of roomDefs){
    if(player.x >= room.worldX && player.x <= room.worldX+ROOM_W &&
       player.y >= room.worldY && player.y <= room.worldY+ROOM_H){
      if(currentRoomKey !== room.key){
        currentRoomKey = room.key;
        document.getElementById('room-name').textContent = room.name;
      }
      break;
    }
  }

  // Пошук найближчих об'єктів
  let nearest = null, nearestDist = 60;
  interactables.forEach(it=>{
    if(!unlockedRooms.has(it.room)) return;
    const d = Phaser.Math.Distance.Between(player.x, player.y, it.wx, it.wy);
    if(d < nearestDist){ nearestDist = d; nearest = it; }
  });
  nearestInteractable = nearest;

  let nearDoor = null, doorDist = 60;
  doorInteractables.forEach(d=>{
    if(d.open) return;
    const dd = Phaser.Math.Distance.Between(player.x, player.y, d.wx, d.wy);
    if(dd < doorDist){ doorDist = dd; nearDoor = d; }
  });
  nearestDoor = nearDoor;

  // Оновлення підказки E
  const prompt = document.getElementById('interact-prompt');
  const target = nearDoor || nearest;
  if(target){
    const cam = this.cameras.main;
    const screenX = (target.wx - cam.scrollX) * cam.zoom;
    const screenY = (target.wy - cam.scrollY) * cam.zoom;
    prompt.style.display='block';
    prompt.style.left = screenX+'px';
    prompt.style.top = (screenY-35)+'px';
    prompt.textContent = 'E';
  } else {
    prompt.style.display='none';
  }
}

function openDoor(doorEntry){
  doorEntry.open = true;
  doorEntry.blocker.destroy();
  doorEntry.sprite.setTexture('door_open');
  unlockedRooms.add(doorEntry.data.to);
  phaserScene.tweens.add({ targets: fogRects[doorEntry.data.to], alpha: 0, duration: 800 });
}

/* =====================================================================
   ЛОГІКА DOM-ВЗАЄМОДІЇ (Тексти, Фото, Відео, Аудіо)
   ===================================================================== */
function interactWith(data){
  if(data.type === 'dialog'){
    document.getElementById('dialog-name').textContent = data.name;
    document.getElementById('dialog-text').innerHTML = data.text;
    document.getElementById('dialog').style.display='block';
    uiState = 'dialog';
  } 
  else {
    // Media (Photo, Video, Audio)
    const container = document.getElementById('media-container');
    container.innerHTML = ''; // Очищуємо попереднє медіа
    
    if(data.type === 'photo'){
      container.innerHTML = `<img src="${data.src}" alt="Фото">`;
    } 
    else if(data.type === 'video'){
      container.innerHTML = `<video src="${data.src}" controls autoplay></video>`;
    } 
    else if(data.type === 'audio'){
      container.innerHTML = `
        <div class="audio-panel">
          <h3>${data.name}</h3>
          <audio src="${data.src}" controls autoplay></audio>
        </div>`;
    }
    document.getElementById('media-modal').style.display = 'flex';
    uiState = 'media';
  }
}

function closeDialog(){
  document.getElementById('dialog').style.display='none';
  uiState = 'game';
}

function closeMedia(){
  // Зупиняємо відео/аудіо при закритті
  document.getElementById('media-container').innerHTML = ''; 
  document.getElementById('media-modal').style.display='none';
  uiState = 'game';
}

const config = {
  type: Phaser.AUTO, parent: 'phaser-container',
  backgroundColor: '#050403',
  scale: { mode: Phaser.Scale.RESIZE, autoCenter: Phaser.Scale.CENTER_BOTH },
  physics: { default:'arcade', arcade:{ gravity:{y:0} } },
  scene: { create, update }
};

new Phaser.Game(config);
</script>
</body>
</html>
